name: Export PDF
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  converttopdf:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
      - name: Install dependencies
        run: npm ci
      - name: Generate PDF
        run: |
          mkdir -p output
          npx md-to-pdf docs/README.md \
            --stylesheet styles/markdown-theme.css \
            --launch-options '{"args":["--no-sandbox","--font-render-hinting=none"]}' \
            --pdf-options '{"format":"A4","margin":{"top":"15mm","bottom":"15mm","left":"15mm","right":"15mm"},"printBackground":true}'
          cp docs/README.pdf output/
      - name: Upload files
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: output
